<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Exposure Logger Docs</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f1e8;
        --card: #fffdf8;
        --text: #1f1a14;
        --muted: #6a6257;
        --border: #d8cdbd;
        --accent: #8f4b24;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        background: linear-gradient(180deg, #f8f4ec 0%, var(--bg) 100%);
        color: var(--text);
      }

      main {
        max-width: 760px;
        margin: 0 auto;
        padding: 48px 20px 64px;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 24px;
        box-shadow: 0 12px 32px rgba(31, 26, 20, 0.08);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 2rem;
      }

      p {
        margin: 0 0 16px;
        line-height: 1.6;
      }

      ul {
        margin: 0;
        padding-left: 20px;
      }

      li + li {
        margin-top: 10px;
      }

      a {
        color: var(--accent);
      }

      .muted {
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <h1>Exposure Logger Docs</h1>
        <p class="muted">
          Public GitHub Pages surface for the project documentation and policy pages.
        </p>
        <ul>
          <li><a href="./privacy-policy.html">Privacy Policy</a></li>
          <li><a href="https://github.com/nguyenston/Exposure-Logger">GitHub Repository</a></li>
        </ul>
      </section>
    </main>
  </body>
</html>
